[pytest]
# ─────────────────────────────────────────────────────────────────
# CAP Backend — pytest configuration
# ─────────────────────────────────────────────────────────────────

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
pythonpath = ../poker_engine

# Markers — declare all custom marks here to avoid PytestUnknownMarkWarning
markers =
    integration: marks tests that require a real PostgreSQL DB and C++ engine (deselect with -m "not integration")
    benchmark: marks performance benchmark tests (run with --benchmark-only)
    slow: marks tests that take > 2 s

# Default options
# -v          verbose output
# -p no:warnings  suppress third-party deprecation noise during normal runs
#   (remove to see warnings during development)
addopts =
    -v
    --tb=short
    --strict-markers

# Hypothesis settings (for property tests in test_equity_api.py etc.)
# Override per-test with @settings(max_examples=...)
# These are conservative defaults suitable for CI.

# Benchmark settings (pytest-benchmark)
# Benchmarks do not gate CI — they are informational only.
# Run explicitly: pytest -m benchmark --benchmark-only